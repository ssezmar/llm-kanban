<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Kanban — Диаграмма классов БД</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #09090b;
    --fg: #fafafa;
    --muted: #71717a;
    --border: #27272a;
    --card: #111113;
    --card-hover: #161618;
    --accent: #a1a1aa;
    --green: #22c55e;
    --blue: #3b82f6;
    --orange: #f97316;
    --red: #ef4444;
    --purple: #8b5cf6;
    --cyan: #06b6d4;
    --yellow: #eab308;
    --pink: #ec4899;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    user-select: none;
  }

  /* ── Canvas ── */
  #canvas {
    width: 100%;
    height: 100%;
    cursor: grab;
  }
  #canvas:active { cursor: grabbing; }
  #canvas.dragging-node { cursor: grabbing; }

  /* ── Header ── */
  .header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 56px;
    background: rgba(9,9,11,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    z-index: 100;
  }
  .header h1 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .header .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-left: 12px;
    font-weight: 400;
  }
  .header-left { display: flex; align-items: center; }
  .header-right { display: flex; align-items: center; gap: 8px; }

  .btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--fg);
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    font-weight: 500;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn:hover { background: #1a1a1e; border-color: #3f3f46; }
  .btn.active { background: #1e3a5f; border-color: var(--blue); color: #60a5fa; }

  /* ── Legend ── */
  .legend {
    position: fixed;
    bottom: 24px;
    left: 24px;
    background: rgba(17,17,19,0.9);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    z-index: 100;
    font-size: 12px;
    max-width: 260px;
  }
  .legend h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 10px;
    font-weight: 600;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 0;
    color: var(--accent);
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .legend-line {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 0;
    color: var(--accent);
    margin-top: 8px;
  }
  .legend-line svg { flex-shrink: 0; }

  /* ── Controls ── */
  .controls {
    position: fixed;
    bottom: 24px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    z-index: 100;
  }
  .controls button {
    width: 40px;
    height: 40px;
    background: rgba(17,17,19,0.9);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    color: var(--fg);
    border-radius: 10px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .controls button:hover { background: #1a1a1e; border-color: #3f3f46; }

  /* ── Minimap ── */
  .minimap {
    position: fixed;
    bottom: 24px;
    right: 80px;
    width: 180px;
    height: 120px;
    background: rgba(17,17,19,0.9);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    z-index: 100;
  }
  .minimap svg { width: 100%; height: 100%; }
  .minimap-viewport {
    fill: none;
    stroke: var(--blue);
    stroke-width: 1.5;
    opacity: 0.5;
  }

  /* ── Tooltip ── */
  .tooltip {
    position: fixed;
    background: rgba(17,17,19,0.95);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    z-index: 200;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    max-width: 320px;
    font-size: 13px;
  }
  .tooltip.visible { opacity: 1; }
  .tooltip h4 { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
  .tooltip .tt-type { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .tooltip .tt-field {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
    gap: 16px;
  }
  .tooltip .tt-field .name { color: var(--accent); font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  .tooltip .tt-field .type { color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 11px; }

  /* ── Hint ── */
  .hint {
    position: fixed;
    top: 72px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(17,17,19,0.85);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 12px;
    color: var(--muted);
    z-index: 100;
    transition: opacity 0.5s;
  }
  kbd {
    background: #27272a;
    border: 1px solid #3f3f46;
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>LLM Kanban</h1>
    <span class="subtitle">Диаграмма классов БД — интерактивная</span>
  </div>
  <div class="header-right">
    <button class="btn" id="btnRelations" onclick="toggleRelations()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Связи
    </button>
    <button class="btn" id="btnLabels" onclick="toggleLabels()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/></svg>
      Подписи
    </button>
    <button class="btn" onclick="autoLayout()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Авто
    </button>
    <button class="btn" onclick="resetView()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      Сброс
    </button>
  </div>
</div>

<svg id="canvas"></svg>

<div class="legend" id="legend">
  <h3>Таблицы</h3>
  <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div> Основные сущности</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div> Конфигурация</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> Пользователи и агенты</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div> Связанные данные</div>
  <h3 style="margin-top:12px;">Связи</h3>
  <div class="legend-line">
    <svg width="32" height="12"><line x1="0" y1="6" x2="32" y2="6" stroke="#52525b" stroke-width="2"/></svg>
    один-ко-многим

  <div class="legend-line">
    <svg width="32" height="12"><line x1="0" y1="6" x2="32" y2="6" stroke="#52525b" stroke-width="2" stroke-dasharray="4 3"/></svg>
    один-к-одному
  </div>
</div>

<div class="controls">
  <button onclick="zoomIn()" title="Zoom In">+</button>
  <button onclick="zoomOut()" title="Zoom Out">−</button>
  <button onclick="fitAll()" title="Fit All">⊡</button>
</div>

<div class="minimap" id="minimap">
  <svg id="minimapSvg"></svg>
</div>

<div class="tooltip" id="tooltip"></div>

<div class="hint" id="hint">
  Перетаскивайте таблицы • Колёсико мыши для зума • Зажмите фон для панорамы • <kbd>R</kbd> сброс • <kbd>L</kbd> авто-раскладка
</div>

<script>
// ═══════════════════════════════════════════════════════
// DATA: Tables & Relations
// ═══════════════════════════════════════════════════════
const tables = [
  {
    id: 'tasks', name: 'tasks', group: 'core', color: '#3b82f6',
    x: 500, y: 300,
    fields: [
      { name: 'id', type: 'uuid', pk: true },
      { name: 'title', type: 'varchar' },
      { name: 'description', type: 'text' },
      { name: 'prompt', type: 'text' },
      { name: 'status', type: 'varchar', fk: 'columns' },

      { name: 'assigned_agent', type: 'uuid', fk: 'agents' },

      { name: 'epic_id', type: 'uuid', fk: 'epics' },

      { name: 'deadline', type: 'timestamp' },

      { name: 'updated_at', type: 'timestamp' },
    ]
  },
  {
    id: 'users', name: 'users', group: 'actors', color: '#22c55e',
    x: 50, y: 100,
    fields: [
      { name: 'id', type: 'uuid', pk: true },
      { name: 'name', type: 'varchar' },
      { name: 'email', type: 'varchar', unique: true },
      { name: 'role', type: 'enum', note: 'admin|manager|developer|viewer' },
      { name: 'avatar', type: 'varchar' },
      { name: 'bio', type: 'text' },
      { name: 'position', type: 'varchar' },
      { name: 'joined_at', type: 'timestamp' },
    ]
  },
  {
    id: 'agents', name: 'agents', group: 'actors', color: '#22c55e',
    x: 50, y: 450,
    fields: [
      { name: 'id', type: 'uuid', pk: true },
      { name: 'name', type: 'varchar' },
      { name: 'type', type: 'enum', note: 'claude-code|codex|gemini-cli|custom' },
      { name: 'avatar', type: 'varchar' },
      { name: 'status', type: 'enum', note: 'idle|busy|offline' },
      { name: 'tasks_completed', type: 'int' },
      { name: 'success_rate', type: 'int' },
      { name: 'description', type: 'text' },
      { name: 'avg_execution_time', type: 'int' },
      { name: 'config', type: 'jsonb', note: 'model, maxTokens, temp' },
      { name: 'created_at', type: 'timestamp' },
    ]
  },
  {
    id: 'epics', name: 'epics', group: 'core', color: '#3b82f6',
    x: 50, y: 800,
    fields: [
      { name: 'id', type: 'uuid', pk: true },
      { name: 'name', type: 'varchar' },
      { name: 'description', type: 'text' },
      { name: 'icon', type: 'varchar' },
      { name: 'color', type: 'varchar' },
      { name: 'status', type: 'enum', note: 'planning|active|completed|archived' },
      { name: 'start_date', type: 'timestamp' },
      { name: 'target_date', type: 'timestamp' },
      { name: 'created_at', type: 'timestamp' },
      { name: 'updated_at', type: 'timestamp' },
    ]
  },
  {
    id: 'columns', name: 'columns', group: 'config', color: '#8b5cf6',
    x: 900, y: 50,
    fields: [
      { name: 'id', type: 'varchar', pk: true },
      { name: 'title', type: 'varchar' },
      { name: 'icon', type: 'varchar' },
      { name: 'description', type: 'text' },
      { name: 'color', type: 'varchar' },
      { name: 'wip_limit', type: 'int' },
      { name: 'sort_order', type: 'int' },
    ]
  },
  {
    id: 'transitions', name: 'transitions', group: 'config', color: '#8b5cf6',
    x: 1200, y: 50,
    fields: [
      { name: 'id', type: 'uuid', pk: true },
      { name: 'from_column', type: 'varchar', fk: 'columns' },
      { name: 'to_column', type: 'varchar', fk: 'columns' },
    ]
  },
  {
    id: 'task_logs', name: 'task_logs', group: 'related', color: '#f97316',
    x: 900, y: 350,
    fields: [
      { name: 'id', type: 'uuid', pk: true },
      { name: 'task_id', type: 'uuid', fk: 'tasks' },
      { name: 'type', type: 'enum', note: 'info|success|error|warning' },
      { name: 'message', type: 'text' },
      { name: 'created_at', type: 'timestamp' },
    ]
  },
  {
    id: 'subtasks', name: 'subtasks', group: 'related', color: '#f97316',
    x: 900, y: 550,
    fields: [
      { name: 'id', type: 'uuid', pk: true },
      { name: 'task_id', type: 'uuid', fk: 'tasks' },
      { name: 'title', type: 'varchar' },
      { name: 'done', type: 'boolean' },
    ]
  },
  {
    id: 'comments', name: 'comments', group: 'related', color: '#f97316',
    x: 900, y: 700,
    fields: [
      { name: 'id', type: 'uuid', pk: true },
      { name: 'task_id', type: 'uuid', fk: 'tasks' },
      { name: 'author_id', type: 'uuid', fk: 'users' },
      { name: 'content', type: 'text' },
      { name: 'created_at', type: 'timestamp' },
    ]
  },
  {
    id: 'reviews', name: 'reviews', group: 'related', color: '#f97316',
    x: 1200, y: 350,
    fields: [
      { name: 'id', type: 'uuid', pk: true },
      { name: 'task_id', type: 'uuid', fk: 'tasks' },
      { name: 'reviewer', type: 'varchar' },
      { name: 'score', type: 'int', note: '1-10' },
      { name: 'comment', type: 'text' },
      { name: 'created_at', type: 'timestamp' },
    ]
  },
  {
    id: 'tags', name: 'tags', group: 'related', color: '#f97316',
    x: 1200, y: 550,
    fields: [
      { name: 'id', type: 'uuid', pk: true },
      { name: 'task_id', type: 'uuid', fk: 'tasks' },
      { name: 'name', type: 'varchar' },
    ]
  },
];

const relations = [
  { from: 'tasks', to: 'columns', fromField: 'status', type: 'many-to-one', label: 'status' },
  { from: 'tasks', to: 'agents', fromField: 'assigned_agent', type: 'many-to-one', label: 'assigned_agent' },
  { from: 'tasks', to: 'users', fromField: 'created_by', type: 'many-to-one', label: 'created_by' },
  { from: 'tasks', to: 'epics', fromField: 'epic_id', type: 'many-to-one', label: 'epic_id' },
  { from: 'task_logs', to: 'tasks', fromField: 'task_id', type: 'many-to-one', label: 'task_id' },
  { from: 'subtasks', to: 'tasks', fromField: 'task_id', type: 'many-to-one', label: 'task_id' },
  { from: 'comments', to: 'tasks', fromField: 'task_id', type: 'many-to-one', label: 'task_id' },
  { from: 'comments', to: 'users', fromField: 'author_id', type: 'many-to-one', label: 'author_id' },
  { from: 'reviews', to: 'tasks', fromField: 'task_id', type: 'one-to-one', label: 'task_id' },
  { from: 'tags', to: 'tasks', fromField: 'task_id', type: 'many-to-one', label: 'task_id' },
  { from: 'transitions', to: 'columns', fromField: 'from_column', type: 'many-to-one', label: 'from' },
  { from: 'transitions', to: 'columns', fromField: 'to_column', type: 'many-to-one', label: 'to' },
];

// ═══════════════════════════════════════════════════════
// LAYOUT CONSTANTS
// ═══════════════════════════════════════════════════════
const HEADER_H = 32;
const ROW_H = 22;
const TABLE_W = 260;
const PADDING = 12;
const CORNER = 8;
const FONT = "'JetBrains Mono', monospace";

function tableHeight(t) {
  return HEADER_H + t.fields.length * ROW_H + PADDING;
}

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let showRelations = true;
let showLabels = true;
let highlightedTable = null;

// ═══════════════════════════════════════════════════════
// SVG SETUP
// ═══════════════════════════════════════════════════════
const svg = d3.select('#canvas');
const width = window.innerWidth;
const height = window.innerHeight;

// Zoom behavior
const zoom = d3.zoom()
  .scaleExtent([0.15, 3])
  .on('zoom', (e) => {
    g.attr('transform', e.transform);
    updateMinimap();
  });

svg.attr('width', width).attr('height', height).call(zoom);

// Main group
const g = svg.append('g').attr('transform', 'translate(0,56)');

// Defs for filters & markers
const defs = svg.append('defs');

// Drop shadow
defs.append('filter')
  .attr('id', 'shadow')
  .attr('x', '-20%').attr('y', '-20%')
  .attr('width', '140%').attr('height', '140%')
  .append('feDropShadow')
  .attr('dx', 0).attr('dy', 4)
  .attr('stdDeviation', 8)
  .attr('flood-color', '#000')
  .attr('flood-opacity', 0.4);

// Glow for hover
defs.append('filter')
  .attr('id', 'glow')
  .attr('x', '-30%').attr('y', '-30%')
  .attr('width', '160%').attr('height', '160%')
  .append('feDropShadow')
  .attr('dx', 0).attr('dy', 0)
  .attr('stdDeviation', 12)
  .attr('flood-color', '#3b82f6')
  .attr('flood-opacity', 0.3);

// Arrow marker
defs.append('marker')
  .attr('id', 'arrow')
  .attr('viewBox', '0 0 10 10')
  .attr('refX', 10).attr('refY', 5)
  .attr('markerWidth', 8).attr('markerHeight', 8)
  .attr('orient', 'auto')
  .append('path')
  .attr('d', 'M 0 0 L 10 5 L 0 10 Z')
  .attr('fill', '#52525b');

// Diamond marker (one-to-one)
defs.append('marker')
  .attr('id', 'diamond')
  .attr('viewBox', '0 0 12 12')
  .attr('refX', 6).attr('refY', 6)
  .attr('markerWidth', 10).attr('markerHeight', 10)
  .attr('orient', 'auto')
  .append('path')
  .attr('d', 'M 0 6 L 6 0 L 12 6 L 6 12 Z')
  .attr('fill', '#52525b');

// ═══════════════════════════════════════════════════════
// RENDER RELATIONS
// ═══════════════════════════════════════════════════════
const linksG = g.append('g').attr('class', 'links');
const labelsG = g.append('g').attr('class', 'labels');
const nodesG = g.append('g').attr('class', 'nodes');

function getTableById(id) { return tables.find(t => t.id === id); }

function getConnectionPoint(table, targetTable) {
  const th = tableHeight(table);
  const cx = table.x + TABLE_W / 2;
  const cy = table.y + th / 2;
  const tcx = targetTable.x + TABLE_W / 2;
  const tcy = targetTable.y + tableHeight(targetTable) / 2;

  const dx = tcx - cx;
  const dy = tcy - cy;

  // Determine which side to connect from
  if (Math.abs(dx) * th > Math.abs(dy) * TABLE_W) {
    // Left or right
    if (dx > 0) return { x: table.x + TABLE_W, y: cy };
    return { x: table.x, y: cy };
  } else {
    // Top or bottom
    if (dy > 0) return { x: cx, y: table.y + th };
    return { x: cx, y: table.y };
  }
}

function renderLinks() {
  linksG.selectAll('*').remove();
  labelsG.selectAll('*').remove();
  if (!showRelations) return;

  relations.forEach((rel, i) => {
    const fromTable = getTableById(rel.from);
    const toTable = getTableById(rel.to);
    if (!fromTable || !toTable) return;

    const p1 = getConnectionPoint(fromTable, toTable);
    const p2 = getConnectionPoint(toTable, fromTable);

    // Curved path
    const mx = (p1.x + p2.x) / 2;
    const my = (p1.y + p2.y) / 2;
    const dx = p2.x - p1.x;
    const dy = p2.y - p1.y;
    const offset = Math.min(40, Math.sqrt(dx*dx + dy*dy) * 0.15);
    // perpendicular offset for curve
    const nx = -dy / Math.sqrt(dx*dx + dy*dy + 1) * offset;
    const ny = dx / Math.sqrt(dx*dx + dy*dy + 1) * offset;

    const highlighted = highlightedTable && (rel.from === highlightedTable || rel.to === highlightedTable);

    const path = linksG.append('path')
      .attr('d', `M ${p1.x} ${p1.y} Q ${mx + nx} ${my + ny} ${p2.x} ${p2.y}`)
      .attr('fill', 'none')
      .attr('stroke', highlighted ? '#60a5fa' : '#3f3f46')
      .attr('stroke-width', highlighted ? 2.5 : 1.5)
      .attr('stroke-dasharray', rel.type === 'one-to-one' ? '6 4' : 'none')
      .attr('marker-end', rel.type === 'one-to-one' ? 'url(#diamond)' : 'url(#arrow)')
      .attr('opacity', highlightedTable ? (highlighted ? 1 : 0.15) : 0.6);

    if (showLabels) {
      // Place label at midpoint of curve
      const labelX = mx + nx * 0.5;
      const labelY = my + ny * 0.5;

      labelsG.append('rect')
        .attr('x', labelX - rel.label.length * 3.5 - 4)
        .attr('y', labelY - 8)
        .attr('width', rel.label.length * 7 + 8)
        .attr('height', 16)
        .attr('rx', 4)
        .attr('fill', '#09090b')
        .attr('stroke', highlighted ? '#3b82f6' : '#27272a')
        .attr('stroke-width', 0.5)
        .attr('opacity', highlightedTable ? (highlighted ? 1 : 0.15) : 0.8);

      labelsG.append('text')
        .attr('x', labelX)
        .attr('y', labelY + 3.5)
        .attr('text-anchor', 'middle')
        .attr('font-size', 9)
        .attr('font-family', FONT)
        .attr('fill', highlighted ? '#60a5fa' : '#52525b')
        .attr('opacity', highlightedTable ? (highlighted ? 1 : 0.15) : 1)
        .text(rel.label);
    }
  });
}

// ═══════════════════════════════════════════════════════
// RENDER TABLES
// ═══════════════════════════════════════════════════════
function renderTables() {
  nodesG.selectAll('*').remove();

  tables.forEach(table => {
    const h = tableHeight(table);
    const isHighlighted = highlightedTable === table.id;
    const isDimmed = highlightedTable && !isHighlighted &&
      !relations.some(r => (r.from === table.id && r.to === highlightedTable) || (r.to === table.id && r.from === highlightedTable));

    const tg = nodesG.append('g')
      .attr('class', 'table-node')
      .attr('data-id', table.id)
      .attr('transform', `translate(${table.x}, ${table.y})`)
      .attr('opacity', isDimmed ? 0.2 : 1)
      .style('cursor', 'grab');

    // Background
    tg.append('rect')
      .attr('width', TABLE_W)
      .attr('height', h)
      .attr('rx', CORNER)
      .attr('fill', '#111113')
      .attr('stroke', isHighlighted ? table.color : '#27272a')
      .attr('stroke-width', isHighlighted ? 2 : 1)
      .attr('filter', isHighlighted ? 'url(#glow)' : 'url(#shadow)');

    // Header bg
    tg.append('rect')
      .attr('width', TABLE_W)
      .attr('height', HEADER_H)
      .attr('rx', CORNER)
      .attr('fill', table.color)
      .attr('opacity', 0.12);

    // Bottom-fill to cover header rounded corners
    tg.append('rect')
      .attr('y', HEADER_H - CORNER)
      .attr('width', TABLE_W)
      .attr('height', CORNER)
      .attr('fill', table.color)
      .attr('opacity', 0.12);

    // Header line
    tg.append('line')
      .attr('x1', 0).attr('y1', HEADER_H)
      .attr('x2', TABLE_W).attr('y2', HEADER_H)
      .attr('stroke', '#27272a');

    // Color indicator
    tg.append('rect')
      .attr('x', PADDING)
      .attr('y', (HEADER_H - 10) / 2)
      .attr('width', 4)
      .attr('height', 10)
      .attr('rx', 2)
      .attr('fill', table.color);

    // Table name
    tg.append('text')
      .attr('x', PADDING + 12)
      .attr('y', HEADER_H / 2 + 4.5)
      .attr('font-size', 13)
      .attr('font-weight', 600)
      .attr('font-family', FONT)
      .attr('fill', '#fafafa')
      .text(table.name);

    // Field count badge
    tg.append('rect')
      .attr('x', TABLE_W - 36)
      .attr('y', (HEADER_H - 18) / 2)
      .attr('width', 24)
      .attr('height', 18)
      .attr('rx', 9)
      .attr('fill', table.color)
      .attr('opacity', 0.2);

    tg.append('text')
      .attr('x', TABLE_W - 24)
      .attr('y', HEADER_H / 2 + 4)
      .attr('text-anchor', 'middle')
      .attr('font-size', 10)
      .attr('font-weight', 600)
      .attr('font-family', FONT)
      .attr('fill', table.color)
      .text(table.fields.length);

    // Fields
    table.fields.forEach((field, i) => {
      const fy = HEADER_H + i * ROW_H + ROW_H / 2 + 4;

      // Hover row bg (invisible, for hover)
      tg.append('rect')
        .attr('x', 1)
        .attr('y', HEADER_H + i * ROW_H)
        .attr('width', TABLE_W - 2)
        .attr('height', ROW_H)
        .attr('fill', 'transparent')
        .attr('class', 'field-hover')
        .on('mouseenter', function() { d3.select(this).attr('fill', 'rgba(255,255,255,0.03)'); })
        .on('mouseleave', function() { d3.select(this).attr('fill', 'transparent'); });

      // PK icon
      if (field.pk) {
        tg.append('text')
          .attr('x', PADDING)
          .attr('y', fy)
          .attr('font-size', 9)
          .attr('font-family', FONT)
          .attr('fill', '#eab308')
          .text('PK');
      }

      // FK icon
      if (field.fk) {
        tg.append('text')
          .attr('x', PADDING)
          .attr('y', fy)
          .attr('font-size', 9)
          .attr('font-family', FONT)
          .attr('fill', '#60a5fa')
          .text('FK');
      }

      // UK icon
      if (field.unique) {
        tg.append('text')
          .attr('x', PADDING)
          .attr('y', fy)
          .attr('font-size', 9)
          .attr('font-family', FONT)
          .attr('fill', '#a78bfa')
          .text('UK');
      }

      // Field name
      tg.append('text')
        .attr('x', PADDING + 24)
        .attr('y', fy)
        .attr('font-size', 11)
        .attr('font-family', FONT)
        .attr('fill', field.pk ? '#eab308' : field.fk ? '#60a5fa' : '#a1a1aa')
        .text(field.name);

      // Field type
      tg.append('text')
        .attr('x', TABLE_W - PADDING)
        .attr('y', fy)
        .attr('text-anchor', 'end')
        .attr('font-size', 10)
        .attr('font-family', FONT)
        .attr('fill', '#52525b')
        .text(field.type);
    });

    // Drag behavior
    const drag = d3.drag()
      .on('start', function(event) {
        d3.select(this).raise();
        svg.classed('dragging-node', true);
      })
      .on('drag', function(event) {
        table.x += event.dx;
        table.y += event.dy;
        d3.select(this).attr('transform', `translate(${table.x}, ${table.y})`);
        renderLinks();
        updateMinimap();
      })
      .on('end', function() {
        svg.classed('dragging-node', false);
      });

    tg.call(drag);

    // Hover highlight
    tg.on('mouseenter', function() {
      highlightedTable = table.id;
      renderLinks();
      renderTables();
      showTooltip(table);
    })
    .on('mouseleave', function() {
      highlightedTable = null;
      renderLinks();
      renderTables();
      hideTooltip();
    });
  });
}

// ═══════════════════════════════════════════════════════
// TOOLTIP
// ═══════════════════════════════════════════════════════
const tooltip = document.getElementById('tooltip');

function showTooltip(table) {
  const relatedTo = relations.filter(r => r.from === table.id).map(r => `→ ${r.to} (${r.label})`);
  const relatedFrom = relations.filter(r => r.to === table.id).map(r => `← ${r.from} (${r.label})`);

  const groupNames = { core: 'Основная сущность', actors: 'Актор', config: 'Конфигурация', related: 'Связанные данные' };

  let html = `<h4>${table.name}</h4>`;
  html += `<div class="tt-type">${groupNames[table.group]} · ${table.fields.length} полей</div>`;

  if (relatedTo.length || relatedFrom.length) {
    html += `<div style="border-top:1px solid #27272a; padding-top:8px; margin-top:4px;">`;
    html += `<div style="font-size:10px;color:#71717a;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">Связи</div>`;
    [...relatedTo, ...relatedFrom].forEach(r => {
      html += `<div style="font-size:12px;color:#a1a1aa;padding:1px 0;font-family:'JetBrains Mono',monospace;">${r}</div>`;
    });
    html += `</div>`;
  }

  tooltip.innerHTML = html;
  tooltip.classList.add('visible');

  // Position next to the cursor
  document.addEventListener('mousemove', positionTooltip);
}

function positionTooltip(e) {
  const tt = tooltip;
  let x = e.clientX + 16;
  let y = e.clientY + 16;
  if (x + tt.offsetWidth > window.innerWidth - 16) x = e.clientX - tt.offsetWidth - 16;
  if (y + tt.offsetHeight > window.innerHeight - 16) y = e.clientY - tt.offsetHeight - 16;
  tt.style.left = x + 'px';
  tt.style.top = y + 'px';
}

function hideTooltip() {
  tooltip.classList.remove('visible');
  document.removeEventListener('mousemove', positionTooltip);
}

// ═══════════════════════════════════════════════════════
// MINIMAP
// ═══════════════════════════════════════════════════════
function updateMinimap() {
  const mmSvg = d3.select('#minimapSvg');
  mmSvg.selectAll('*').remove();

  // Find bounds of all tables
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  tables.forEach(t => {
    minX = Math.min(minX, t.x);
    minY = Math.min(minY, t.y);
    maxX = Math.max(maxX, t.x + TABLE_W);
    maxY = Math.max(maxY, t.y + tableHeight(t));
  });

  const pad = 50;
  minX -= pad; minY -= pad; maxX += pad; maxY += pad;
  const dw = maxX - minX;
  const dh = maxY - minY;
  const scale = Math.min(180 / dw, 120 / dh);

  const mmg = mmSvg.append('g')
    .attr('transform', `translate(${(180 - dw * scale) / 2}, ${(120 - dh * scale) / 2})`);

  // Draw relations
  if (showRelations) {
    relations.forEach(rel => {
      const ft = getTableById(rel.from);
      const tt = getTableById(rel.to);
      if (!ft || !tt) return;
      mmg.append('line')
        .attr('x1', (ft.x + TABLE_W/2 - minX) * scale)
        .attr('y1', (ft.y + tableHeight(ft)/2 - minY) * scale)
        .attr('x2', (tt.x + TABLE_W/2 - minX) * scale)
        .attr('y2', (tt.y + tableHeight(tt)/2 - minY) * scale)
        .attr('stroke', '#27272a')
        .attr('stroke-width', 0.5);
    });
  }

  // Draw table rects
  tables.forEach(t => {
    mmg.append('rect')
      .attr('x', (t.x - minX) * scale)
      .attr('y', (t.y - minY) * scale)
      .attr('width', TABLE_W * scale)
      .attr('height', tableHeight(t) * scale)
      .attr('rx', 2)
      .attr('fill', t.color)
      .attr('opacity', 0.4);
  });

  // Viewport rect
  const transform = d3.zoomTransform(svg.node());
  const vx = (-transform.x / transform.k - minX) * scale;
  const vy = (-transform.y / transform.k - minY) * scale;
  const vw = (width / transform.k) * scale;
  const vh = (height / transform.k) * scale;

  mmg.append('rect')
    .attr('x', vx).attr('y', vy)
    .attr('width', vw).attr('height', vh)
    .attr('class', 'minimap-viewport');
}

// ═══════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════
function toggleRelations() {
  showRelations = !showRelations;
  document.getElementById('btnRelations').classList.toggle('active', showRelations);
  renderLinks();
  updateMinimap();
}

function toggleLabels() {
  showLabels = !showLabels;
  document.getElementById('btnLabels').classList.toggle('active', showLabels);
  renderLinks();
}

function autoLayout() {
  // Grid layout with grouping
  const groups = {
    actors: tables.filter(t => t.group === 'actors'),
    core: tables.filter(t => t.group === 'core'),
    config: tables.filter(t => t.group === 'config'),
    related: tables.filter(t => t.group === 'related'),
  };

  const startX = 80;
  const gapX = 320;
  let col = 0;

  Object.values(groups).forEach(groupTables => {
    let y = 100;
    groupTables.forEach(t => {
      t.x = startX + col * gapX;
      t.y = y;
      y += tableHeight(t) + 40;
    });
    col++;
  });

  // Animate
  nodesG.selectAll('.table-node').each(function() {
    const id = d3.select(this).attr('data-id');
    const t = getTableById(id);
    d3.select(this)
      .transition().duration(600).ease(d3.easeCubicOut)
      .attr('transform', `translate(${t.x}, ${t.y})`);
  });

  setTimeout(() => {
    renderLinks();
    renderTables();
    updateMinimap();
    fitAll();
  }, 650);
}

function resetView() {
  svg.transition().duration(500).call(
    zoom.transform,
    d3.zoomIdentity.translate(0, 56).scale(0.85)
  );
}

function zoomIn() {
  svg.transition().duration(300).call(zoom.scaleBy, 1.3);
}

function zoomOut() {
  svg.transition().duration(300).call(zoom.scaleBy, 0.7);
}

function fitAll() {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  tables.forEach(t => {
    minX = Math.min(minX, t.x);
    minY = Math.min(minY, t.y);
    maxX = Math.max(maxX, t.x + TABLE_W);
    maxY = Math.max(maxY, t.y + tableHeight(t));
  });

  const pad = 80;
  const dw = maxX - minX + pad * 2;
  const dh = maxY - minY + pad * 2;
  const scale = Math.min(width / dw, (height - 56) / dh, 1.5);
  const tx = (width - dw * scale) / 2 - minX * scale + pad * scale;
  const ty = (height - dh * scale) / 2 - minY * scale + pad * scale + 28;

  svg.transition().duration(500).call(
    zoom.transform,
    d3.zoomIdentity.translate(tx, ty).scale(scale)
  );
}

// ═══════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════════════
document.addEventListener('keydown', (e) => {
  if (e.key === 'r' || e.key === 'R') resetView();
  if (e.key === 'l' || e.key === 'L') autoLayout();
  if (e.key === 'f' || e.key === 'F') fitAll();
  if (e.key === '+' || e.key === '=') zoomIn();
  if (e.key === '-') zoomOut();
});

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
document.getElementById('btnRelations').classList.add('active');
document.getElementById('btnLabels').classList.add('active');

renderLinks();
renderTables();

// Initial fit
setTimeout(() => fitAll(), 100);
setTimeout(() => updateMinimap(), 200);

// Hide hint after a few seconds
setTimeout(() => {
  document.getElementById('hint').style.opacity = '0';
  setTimeout(() => document.getElementById('hint').style.display = 'none', 500);
}, 6000);

// Window resize
window.addEventListener('resize', () => {
  svg.attr('width', window.innerWidth).attr('height', window.innerHeight);
});
</script>
